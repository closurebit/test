name: Second Workflow
on: push

jobs:
    run-first-command:
        runs-on: ubuntu-latest
        steps:
            - name: Display Node version on Ubuntu
              run: node -v
        
            - name: Display NPM version on Ubuntu
              run: npm -v
        
    run-parallel-command:
        runs-on: windows-latest
        steps:
            - name: Display Node version on Windows
              run: node -v
        
            - name: Display NPM version on Windows
              run: npm -v
    
    run-second-command:
        runs-on: macos-latest
        needs: run-first-command
        steps:
            - name: Display Node version on MacOs
              run: node -v

            - name: Display NPM version on MacOs
              run: npm -v
